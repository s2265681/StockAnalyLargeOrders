name: Deploy to Aliyun

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /www/StockAnalyLargeOrders

            echo "===> Pull latest code"
            git fetch --all
            git reset --hard origin/${GITHUB_REF_NAME:-main}

            echo "===> Backend: install deps if requirements.txt changed"
            cd backend
            source venv/bin/activate
            if ! diff -q requirements.txt venv/.last_requirements.txt > /dev/null 2>&1; then
              echo "requirements.txt changed, reinstalling..."
              pip install -r requirements.txt
              cp requirements.txt venv/.last_requirements.txt
            else
              echo "requirements.txt unchanged, skipping pip install"
            fi
            deactivate
            cd ..

            echo "===> Frontend: install + build"
            cd frontend
            if ! diff -q package.json node_modules/.last_pkg.json > /dev/null 2>&1; then
              echo "package.json changed, reinstalling..."
              pnpm install
              cp package.json node_modules/.last_pkg.json
            fi
            pnpm run build:prod
            cd ..

            echo "===> Restart backend via PM2"
            pm2 restart StockAnalysisLargeOrders || pm2 start ecosystem.config.js

            echo "===> Reload Nginx (frontend is static, no need to restart)"
            nginx -t && systemctl reload nginx

            echo "===> Deploy success ✅"
