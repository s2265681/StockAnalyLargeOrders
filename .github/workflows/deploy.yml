name: Deploy to Aliyun

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend
        working-directory: frontend
        env:
          CI: "false"
          GENERATE_SOURCEMAP: "false"
          NODE_OPTIONS: --max-old-space-size=4096
        run: |
          pnpm install --no-frozen-lockfile
          pnpm run build:prod

      - name: Prepare backend via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /www/StockAnalyLargeOrders

            echo "===> Pull latest code"
            for attempt in 1 2 3; do
              if git -c http.version=HTTP/1.1 fetch --prune origin; then
                break
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "git fetch failed after ${attempt} attempts"
                exit 1
              fi
              echo "git fetch failed, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            done
            git reset --hard origin/${{ github.ref_name }}

            echo "===> Ensure runtime directories"
            mkdir -p logs backend/logs

            echo "===> Backend: install deps if requirements.txt changed"
            cd backend
            if [ ! -d venv ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            if ! diff -q requirements.txt venv/.last_requirements.txt > /dev/null 2>&1; then
              echo "requirements.txt changed, reinstalling..."
              pip install -r requirements.txt
              cp requirements.txt venv/.last_requirements.txt
            else
              echo "requirements.txt unchanged, skipping pip install"
            fi

            echo "===> Backend: run database migrations"
            command -v mysql > /dev/null
            for migration in \
              migrations/create_dragon_tiger_tables.sql \
              migrations/create_user_auth_tables.sql \
              migrations/20260516_create_dragon_tiger_seat_aliases.sql \
              migrations/20260516_add_more_seat_aliases_from_image.sql \
              migrations/20260516_cleanup_dragon_tiger_seat_duplicates.sql \
              migrations/20260517_create_theme_tables.sql \
              migrations/20260517_create_auction_grab_tables.sql \
              migrations/20260517_emotion_intraday_columns.sql \
              migrations/20260519_auction_grab_score_fields.sql \
              migrations/20260520_create_alert_rules.sql \
              migrations/20260520_create_market_brief.sql \
              migrations/20260520_alter_market_brief_news.sql \
              migrations/20260520_create_page_daily_activity.sql \
              migrations/20260522_add_users_default_email.sql \
              migrations/20260522_alert_rules_cooldown_wechat.sql
            do
              if [ -f "$migration" ]; then
                echo "Applying $migration"
                MYSQL_PWD="${MYSQL_PASSWORD:-123456}" mysql \
                  -h"${MYSQL_HOST:-127.0.0.1}" \
                  -P"${MYSQL_PORT:-3306}" \
                  -u"${MYSQL_USER:-root}" \
                  "${MYSQL_DATABASE:-stock}" < "$migration"
              fi
            done
            deactivate
            cd ..

            echo "===> Ensure PM2 interpreter compatibility"
            ln -sfn backend/venv venv

            echo "===> Backend: free port 9001 then start (early)"
            chmod +x backend/scripts/ensure_single_backend.sh
            bash backend/scripts/ensure_single_backend.sh

      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: frontend/build/**
          target: /www/StockAnalyLargeOrders/frontend/build
          strip_components: 2
          rm: true

      - name: Restart services via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          command_timeout: 5m
          script: |
            set -e
            cd /www/StockAnalyLargeOrders

            echo "===> Configure Nginx"
            mkdir -p /var/www/letsencrypt
            if [ -f /etc/letsencrypt/live/stockai.xin/fullchain.pem ] && [ -f /etc/letsencrypt/live/stockai.xin/privkey.pem ]; then
            cat > /etc/nginx/sites-available/stock-analysis <<'NGINX'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name stockai.xin www.stockai.xin;

                location /.well-known/acme-challenge/ {
                    root /var/www/letsencrypt;
                }

                location / {
                    return 301 https://$host$request_uri;
                }
            }

            server {
                listen 443 ssl http2 default_server;
                listen [::]:443 ssl http2 default_server;
                server_name stockai.xin www.stockai.xin;

                ssl_certificate /etc/letsencrypt/live/stockai.xin/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/stockai.xin/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers off;

                root /www/StockAnalyLargeOrders/frontend/build;
                index index.html;

                location /api/ {
                    proxy_pass http://127.0.0.1:9001/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /health {
                    proxy_pass http://127.0.0.1:9001/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /socket.io/ {
                    proxy_pass http://127.0.0.1:9001/socket.io/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                }

                location = / {
                    index landing.html;
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX
            else
            cat > /etc/nginx/sites-available/stock-analysis <<'NGINX'
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _ stockai.xin www.stockai.xin;

                root /www/StockAnalyLargeOrders/frontend/build;
                index index.html;

                location /.well-known/acme-challenge/ {
                    root /var/www/letsencrypt;
                }

                location /api/ {
                    proxy_pass http://127.0.0.1:9001/api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /health {
                    proxy_pass http://127.0.0.1:9001/health;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }

                location /socket.io/ {
                    proxy_pass http://127.0.0.1:9001/socket.io/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                }

                location = / {
                    index landing.html;
                }

                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX
            fi
            rm -f /etc/nginx/sites-enabled/default
            ln -sf /etc/nginx/sites-available/stock-analysis /etc/nginx/sites-enabled/stock-analysis

            echo "===> Backend: free port 9001 then start (final)"
            chmod +x backend/scripts/ensure_single_backend.sh
            bash backend/scripts/ensure_single_backend.sh

            echo "===> Reload Nginx (frontend is static, no need to restart)"
            nginx -t && systemctl reload nginx

            echo "===> Public endpoint consistency (detect LB / stale nodes)"
            PUBLIC_BASE="${PUBLIC_HEALTH_BASE:-http://127.0.0.1:9001}"
            ok=0
            old=0
            for i in $(seq 1 12); do
              body=$(curl -fsS "${PUBLIC_BASE}/health" 2>/dev/null || echo "")
              if echo "$body" | grep -q '"alert_rules"[[:space:]]*:[[:space:]]*true'; then
                ok=$((ok + 1))
              else
                old=$((old + 1))
              fi
              sleep 0.3
            done
            echo "health sample: new=${ok} old=${old} (base=${PUBLIC_BASE})"
            if [ "$old" -gt 0 ]; then
              echo "WARNING: mixed backend versions detected."
              echo "If ${PUBLIC_BASE} is 127.0.0.1, kill stray processes: lsof -i:9001"
              echo "If using SLB/domain, deploy or restart ALL backend nodes."
              exit 1
            fi
            test -f /www/StockAnalyLargeOrders/frontend/build/index.html

            echo "===> Server ops: swap + cron + logrotate"
            cd /www/StockAnalyLargeOrders
            chmod +x backend/jobs/run_*.sh backend/jobs/install_server_crontab.sh backend/jobs/setup_server_ops.sh
            bash backend/jobs/setup_server_ops.sh

            echo "===> Deploy success"
